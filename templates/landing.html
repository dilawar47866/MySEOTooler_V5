<!-- Replace the script tag at bottom of landing.html -->
<script>
    let scans = localStorage.getItem('scanCount') ? parseInt(localStorage.getItem('scanCount')) : 3;
    document.getElementById('scansLeft').innerText = scans;

    async function runPublicAudit() {
        const url = document.getElementById('scanUrl').value;
        if(!url) return alert("Please enter a website URL");

        if(scans <= 0) {
            window.location.href = "/signup"; 
            return;
        }

        document.getElementById('scanBtn').disabled = true;
        document.getElementById('loader').classList.remove('d-none');
        document.getElementById('resultCard').classList.add('d-none');

        setTimeout(async () => {
            try {
                const res = await fetch('/api/public-audit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();

                document.getElementById('loader').classList.add('d-none');
                document.getElementById('resultCard').classList.remove('d-none');
                document.getElementById('scoreDisplay').innerText = data.score;
                document.getElementById('scanId').innerText = Math.floor(Math.random() * 10000);

                // INJECT REAL ISSUES INTO THE PREVIEW (NEW)
                const issuesList = data.issues.length > 0 ? data.issues : ["Page Load Speed", "Broken Links"];
                const previewHtml = `
                    <div class="d-flex justify-content-between p-3 bg-white bg-opacity-10 rounded mb-2">
                        <span>${issuesList[0]}</span>
                        <span class="text-danger fw-bold">Critical</span>
                    </div>
                    ${issuesList.length > 1 ? `
                    <div class="d-flex justify-content-between p-3 bg-white bg-opacity-10 rounded mb-2">
                        <span>${issuesList[1]}</span>
                        <span class="text-danger fw-bold">Critical</span>
                    </div>` : ''}
                    <div class="d-flex justify-content-between p-3 bg-white bg-opacity-10 rounded mb-2">
                        <span>Advanced Mobile Usability</span>
                        <span class="text-warning fw-bold">Warning</span>
                    </div>
                    <p class="text-white-50 mt-3">...and 5 more technical issues found.</p>
                `;
                
                document.querySelector('.blur-overlay').innerHTML = previewHtml;

                scans--;
                localStorage.setItem('scanCount', scans);
                document.getElementById('scansLeft').innerText = scans;
                document.getElementById('resultCard').scrollIntoView({behavior: "smooth"});

            } catch(e) {
                alert("Error scanning site.");
                document.getElementById('loader').classList.add('d-none');
                document.getElementById('scanBtn').disabled = false;
            }
        }, 2000);
    }
</script>
