{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-check-double mr-2 text-orange-500"></i> Internal Plagiarism Checker</h2>
        <p class="text-sm text-slate-500 mb-4">Checks if this content duplicates other articles in your library.</p>
        
        <div class="mb-6">
            <textarea id="content" rows="8" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="Paste content to check..."></textarea>
        </div>
        
        <button onclick="checkPlagiarism()" id="btn" class="bg-orange-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-orange-600 transition w-full">
            <i class="fas fa-search mr-2"></i> Check Content
        </button>

        <div id="result" class="hidden mt-8 p-6 rounded-lg border"></div>
    </div>
</div>

<script>
async function checkPlagiarism() {
    const btn = document.getElementById('btn');
    const content = document.getElementById('content').value;
    
    if(!content) return alert("Please enter content");
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/api/check-plagiarism', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: content})
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        
        const resultDiv = document.getElementById('result');
        resultDiv.className = data.verdict === 'Original' 
            ? "mt-8 p-6 rounded-lg border bg-green-50 border-green-200 text-green-800" 
            : "mt-8 p-6 rounded-lg border bg-red-50 border-red-200 text-red-800";
            
        let html = `<h3 class="text-xl font-bold mb-2">Verdict: ${data.verdict}</h3>`;
        
        if(data.matches && data.matches.length > 0) {
            html += `<p class="mb-2">Matches found in:</p><ul class="list-disc pl-5">`;
            data.matches.forEach(m => html += `<li>${m.source_title} (${m.count} sentences)</li>`);
            html += `</ul>`;
        } else {
            html += `<p>No duplicate content found in your library.</p>`;
        }
        
        resultDiv.innerHTML = html;
        resultDiv.classList.remove('hidden');
    } catch(e) {
        alert(e.message);
    } finally {
        btn.innerHTML = '<i class="fas fa-search"></i> Check Content';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
