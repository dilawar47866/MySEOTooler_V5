{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-search text-dark"></i> AI Originality Check</h2>
    <p class="text-muted">Analyze if your text sounds like AI and rewrite it.</p>
    <textarea id="text" class="form-control mb-3" rows="6" placeholder="Paste text..."></textarea>
    <button class="btn btn-dark" onclick="checkPlag()">Analyze Originality</button>
    <div id="output" class="mt-3 card p-3 d-none"></div>
</div>
<script>
async function checkPlag() {
    const t = document.getElementById('text').value;
    if(!t) return;
    document.getElementById('output').classList.remove('d-none');
    document.getElementById('output').innerText = "Analyzing...";
    const res = await fetch('/api/generate-content', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword: `Analyze this text for AI patterns. Give a percentage score of how "Human" it sounds. Then, rewrite it to sound 100% unique and human. Text: "${t}"`, mode:'standard'})});
    const d = await res.json();
    document.getElementById('output').innerHTML = d.html_content;
}
</script>
{% endblock %}
