{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-search text-dark"></i> AI Originality Check & Rewriter</h2>
    <p class="text-muted">Check if your text sounds like AI and rewrite it to be human.</p>
    <div class="card p-4 shadow-sm">
        <textarea id="text" class="form-control mb-3" rows="6" placeholder="Paste text..."></textarea>
        <button class="btn btn-dark w-100" onclick="checkPlag()">Analyze & Rewrite</button>
    </div>
    <div id="loading" class="text-center mt-3 d-none"><div class="spinner-border"></div></div>
    <div id="output" class="mt-3 card p-3 d-none" style="white-space: pre-wrap;"></div>
</div>
<script>
async function checkPlag() {
    const t = document.getElementById('text').value;
    if(!t) return;
    document.getElementById('loading').classList.remove('d-none');
    const res = await fetch('/api/generate-content', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword: `Analyze this text for AI patterns. Give a percentage score of how "Human" it sounds. Then, rewrite it to sound 100% unique and human. Text: "${t}"`, mode:'standard'})});
    const d = await res.json();
    document.getElementById('loading').classList.add('d-none');
    document.getElementById('output').classList.remove('d-none');
    document.getElementById('output').innerHTML = d.html_content;
}
</script>
{% endblock %}
