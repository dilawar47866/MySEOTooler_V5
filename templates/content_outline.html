{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4"><i class="fas fa-list-ol"></i> Blog Post Outline Generator</h2>
            <div class="card shadow-sm p-4 mb-4">
                <label class="fw-bold">Topic or Keyword</label>
                <div class="input-group mt-2">
                    <input type="text" id="topic" class="form-control" placeholder="e.g. How to train a puppy">
                    <button class="btn btn-primary" onclick="generateOutline()">Generate Outline</button>
                </div>
            </div>

            <div id="loading" class="text-center" style="display:none;">
                <div class="spinner-border text-primary"></div><br>Planning content structure...
            </div>

            <div id="resultArea" style="display:none;">
                <div class="card shadow-sm">
                    <div class="card-header fw-bold bg-light">Generated Outline</div>
                    <div class="card-body" id="output" style="white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function generateOutline() {
    const topic = document.getElementById('topic').value;
    if(!topic) return alert("Please enter a topic");

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';

    // reusing the existing content endpoint but treating it as a prompt
    try {
        const res = await fetch('/api/generate-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword: "Generate a detailed H2/H3 blog outline for: " + topic, mode: "standard" })
        });
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        
        if(data.content) {
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('output').innerText = data.content;
        } else {
            alert("Failed to generate.");
        }
    } catch(e) { alert("Error connecting to AI"); }
}
</script>
{% endblock %}
