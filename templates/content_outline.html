{% extends "base.html" %}

{% block title %}Content Outline Generator - My SEO King Tool{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-10">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="h3 fw-bold mb-1">Blog Post Outline</h2>
                    <p class="text-muted">Plan your content structure perfectly before writing.</p>
                </div>
                <div class="bg-white p-2 rounded-circle shadow-sm">
                    <i class="fas fa-list-ol fa-2x text-primary"></i>
                </div>
            </div>

            <!-- Input -->
            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <div class="input-group input-group-lg">
                        <input type="text" id="outlineTopic" class="form-control" placeholder="E.g. The Ultimate Guide to Camping in Winter">
                        <button class="btn btn-primary px-5" id="genBtn" onclick="generateOutline()">
                            <i class="fas fa-layer-group me-2"></i> Generate Outline
                        </button>
                    </div>
                </div>
            </div>

            <!-- Output -->
            <div id="resultArea" class="d-none">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Generated Structure</span>
                        <button class="btn btn-sm btn-outline-success" onclick="sendToEditor()">
                            <i class="fas fa-pen me-1"></i> Edit in AI Editor
                        </button>
                    </div>
                    <div class="card-body p-5 bg-light" id="outlineOutput">
                        <!-- Content goes here -->
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let generatedHTML = "";

async function generateOutline() {
    const topic = document.getElementById('outlineTopic').value;
    if(!topic) return alert("Enter a topic");

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    const prompt = `Create a detailed SEO Content Outline for the topic: "${topic}".
    Include:
    - H1 Title
    - H2 Headings (at least 5)
    - H3 Sub-headings under each H2
    - Bullet points for what to cover in each section.
    Format using Markdown.`;

    try {
        const res = await fetch('/api/generate-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: prompt, mode: 'ai'})
        });
        const data = await res.json();
        if(data.success) {
            generatedHTML = data.html_content;
            document.getElementById('outlineOutput').innerHTML = data.html_content;
            document.getElementById('resultArea').classList.remove('d-none');
        }
    } catch(e) { console.error(e); }
    finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-layer-group me-2"></i> Generate Outline';
    }
}

function sendToEditor() {
    // Send the outline to the main editor to start writing
    const topic = document.getElementById('outlineTopic').value;
    const content = document.getElementById('outlineOutput').innerText;
    
    fetch('/api/save-content', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            title: "Outline: " + topic,
            content: content,
            html_content: generatedHTML,
            keyword: topic
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) window.location.href = `/editor?id=${data.id}`;
    });
}
</script>
{% endblock %}
