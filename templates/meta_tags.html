{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-tags text-info"></i> Meta Tag Generator</h2>
    <input type="text" id="title" class="form-control mb-2" placeholder="Page Title">
    <textarea id="desc" class="form-control mb-3" placeholder="Page Content/Summary..."></textarea>
    <button class="btn btn-info text-white w-100" onclick="genMeta()">Generate Tags</button>
    <textarea id="output" class="form-control mt-3 bg-dark text-success" rows="5" readonly></textarea>
</div>
<script>
async function genMeta() {
    const t = document.getElementById('title').value;
    const c = document.getElementById('desc').value;
    const res = await fetch('/api/generate-content', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword: `Write a Meta Title (max 60 chars) and Meta Description (max 160 chars) for: Title: ${t}, Content: ${c}. Output as HTML meta tags.`, mode:'standard'})});
    const d = await res.json();
    document.getElementById('output').value = d.content;
}
</script>
{% endblock %}
