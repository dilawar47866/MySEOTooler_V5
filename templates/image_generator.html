{% extends "base.html" %}
{% block title %}AI Image Generator - MySEO King{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h3 fw-bold">AI Image Generator (DALL-E 3)</h2>
                <span class="badge bg-warning text-dark">Pro Only</span>
            </div>

            <div class="card shadow-sm p-4 mb-4">
                <label class="form-label fw-bold">Describe your image</label>
                <textarea id="imgPrompt" class="form-control mb-3" rows="2" placeholder="A futuristic workspace with glowing neon lights..."></textarea>
                <button class="btn btn-primary w-100" id="genBtn" onclick="generateImage()">
                    <i class="fas fa-paint-brush me-2"></i> Generate Image (5 Credits)
                </button>
            </div>

            <div id="resultArea" class="d-none text-center">
                <img id="outputImg" src="" class="img-fluid rounded shadow-sm mb-3" style="max-height: 500px;">
                <br>
                <a id="downloadLink" href="" download="generated-image.png" target="_blank" class="btn btn-outline-dark">Download HD</a>
            </div>
        </div>
    </div>
</div>
<script>
async function generateImage() {
    const prompt = document.getElementById('imgPrompt').value;
    if(!prompt) return alert("Enter a prompt");
    
    const btn = document.getElementById('genBtn');
    btn.disabled = true; btn.innerHTML = "Generating HD Image... (Wait 10s)";
    
    try {
        const res = await fetch('/api/generate-image', {
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: prompt})
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('outputImg').src = data.image_url;
            document.getElementById('downloadLink').href = data.image_url;
            document.getElementById('resultArea').classList.remove('d-none');
        } else {
            alert(data.error);
        }
    } catch(e) { console.error(e); }
    finally { btn.disabled = false; btn.innerHTML = "Generate Image"; }
}
</script>
{% endblock %}
