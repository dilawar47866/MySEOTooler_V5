<script>
async function toggleUser(id) {
    if(!confirm("Change this user's active status?")) return;
    try {
        const res = await fetch(`/admin/user/${id}/toggle`, {method: 'POST'});
        const data = await res.json();
        if(data.success) {
            window.location.reload();
        } else {
            alert(data.error);
        }
    } catch(e) { alert("Error connecting to server"); }
}

async function deleteUser(id) {
    if(!confirm("PERMANENTLY DELETE USER? This will delete all their content and cannot be undone.")) return;
    try {
        const res = await fetch(`/admin/user/${id}/delete`, {method: 'POST'});
        const data = await res.json();
        if(data.success) {
            document.getElementById(`user-row-${id}`).remove();
        } else {
            alert("Error: " + data.error);
        }
    } catch(e) { 
        console.error(e);
        alert("Error connecting to server. Check console for details."); 
    }
}
</script>
