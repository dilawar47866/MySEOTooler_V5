{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-spy mr-2 text-green-500"></i> Competitor Analyzer</h2>
        
        <div class="mb-6">
            <label class="block text-sm font-bold mb-2 text-slate-700">Enter Competitor URL:</label>
            <input type="text" id="urlInput" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500" placeholder="https://competitor.com/article">
        </div>
        
        <button onclick="analyze()" id="btn" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition w-full">
            <i class="fas fa-search mr-2"></i> Analyze URL
        </button>

        <div id="result" class="hidden mt-8 bg-slate-50 p-6 rounded-lg border"></div>
    </div>
</div>

<script>
async function analyze() {
    const btn = document.getElementById('btn');
    const url = document.getElementById('urlInput').value;
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/api/analyze-competitor', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url})
        });
        const data = await res.json();
        
        if(data.error) throw new Error(data.error);
        
        let html = `<h3 class="font-bold text-xl mb-4">${data.analysis.title}</h3>`;
        html += `<div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-white p-3 rounded shadow-sm">Words: <b>${data.analysis.word_count}</b></div>
                    <div class="bg-white p-3 rounded shadow-sm">Images: <b>${data.analysis.image_count}</b></div>
                 </div>`;
        html += `<h4 class="font-bold mt-4">H1 Tags Used:</h4><ul class="list-disc pl-5">`;
        data.analysis.h1_tags.forEach(h => html += `<li>${h}</li>`);
        html += `</ul>`;
        
        document.getElementById('result').innerHTML = html;
        document.getElementById('result').classList.remove('hidden');
    } catch(e) {
        alert(e.message);
    } finally {
        btn.innerHTML = '<i class="fas fa-search"></i> Analyze URL';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
