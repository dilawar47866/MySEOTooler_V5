<div class="container mt-4">
    <h2>Robots.txt Generator</h2>
    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="mb-3">
                    <label>User Agent (Default: *)</label>
                    <input type="text" id="userAgent" class="form-control" value="*">
                </div>
                <div class="mb-3">
                    <label>Disallow (e.g. /admin)</label>
                    <input type="text" id="disallowPath" class="form-control" placeholder="/private">
                </div>
                <div class="mb-3">
                    <label>Allow (e.g. /public)</label>
                    <input type="text" id="allowPath" class="form-control" placeholder="/public">
                </div>
                <div class="mb-3">
                    <label>Sitemap URL</label>
                    <input type="url" id="sitemapUrl" class="form-control" placeholder="https://example.com/sitemap.xml">
                </div>
                <button class="btn btn-success w-100" onclick="generateRobots()">Generate File</button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4 h-100">
                <label>Output:</label>
                <textarea id="robotsOutput" class="form-control h-100" style="min-height: 300px; font-family: monospace;"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
async function generateRobots() {
    const data = {
        userAgent: document.getElementById('userAgent').value,
        disallow: document.getElementById('disallowPath').value,
        allow: document.getElementById('allowPath').value,
        sitemap: document.getElementById('sitemapUrl').value
    };

    try {
        const res = await fetch('/api/generate-robots', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if(result.success) {
            document.getElementById('robotsOutput').value = result.content;
        } else {
            alert("Error: " + result.error);
        }
    } catch (e) {
        alert("Network Error");
    }
}
</script>
