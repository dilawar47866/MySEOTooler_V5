{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-robot mr-2 text-gray-600"></i> Robots.txt Generator</h2>
        
        <div class="mb-6">
            <label class="block text-sm font-bold mb-2 text-slate-700">Sitemap URL (Optional):</label>
            <input type="text" id="sitemap" class="w-full p-3 border rounded-lg" placeholder="https://yourwebsite.com/sitemap.xml">
        </div>
        
        <button onclick="generateRobots()" class="bg-gray-800 text-white px-6 py-3 rounded-lg font-bold hover:bg-gray-900 transition w-full">
            Generate File
        </button>

        <div id="result" class="hidden mt-8">
            <textarea id="output" readonly class="w-full h-48 p-4 bg-slate-100 font-mono text-sm rounded-lg border"></textarea>
        </div>
    </div>
</div>

<script>
async function generateRobots() {
    const sitemap = document.getElementById('sitemap').value;
    
    const res = await fetch('/api/generate-robots', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sitemap_url: sitemap})
    });
    const data = await res.json();
    
    document.getElementById('output').value = data.robots_txt;
    document.getElementById('result').classList.remove('hidden');
}
</script>
{% endblock %}
