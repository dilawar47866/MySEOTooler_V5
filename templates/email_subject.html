{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-envelope text-warning"></i> Email Subject Line Generator</h2>
    <textarea id="emailBody" class="form-control mb-3" placeholder="Paste your email body here..."></textarea>
    <button class="btn btn-warning w-100" onclick="genSub()">Generate 10 Subject Lines</button>
    <div id="output" class="mt-4 list-group"></div>
</div>
<script>
async function genSub() {
    const b = document.getElementById('emailBody').value;
    if(!b) return;
    const res = await fetch('/api/generate-content', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword: `Generate 10 high-converting email subject lines for: "${b}"`, mode:'standard'})});
    const d = await res.json();
    document.getElementById('output').innerHTML = `<pre>${d.content}</pre>`;
}
</script>
{% endblock %}
