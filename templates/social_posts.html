{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-share-alt text-primary"></i> Social Media Post Generator</h2>
    <div class="card p-4 shadow-sm">
        <textarea id="content" class="form-control mb-3" rows="4" placeholder="Paste your article or topic here..."></textarea>
        <button class="btn btn-primary w-100" onclick="genSocial()">Generate Posts (LinkedIn, Twitter, FB)</button>
    </div>
    <div id="output" class="mt-4 card p-4 bg-light d-none" style="white-space: pre-wrap;"></div>
</div>
<script>
async function genSocial() {
    const c = document.getElementById('content').value;
    if(!c) return;
    document.getElementById('output').classList.remove('d-none');
    document.getElementById('output').innerText = "Generating...";
    const res = await fetch('/api/generate-content', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword: `Write a LinkedIn post, a Twitter thread (3 tweets), and a Facebook post for this content: "${c}"`, mode:'standard'})});
    const d = await res.json();
    document.getElementById('output').innerText = d.content;
}
</script>
{% endblock %}
