{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4"><i class="fas fa-image"></i> AI Alt Text Generator</h2>
            <p>Describe your image, and the AI will generate SEO-optimized Alt Text.</p>

            <div class="card shadow-sm p-4">
                <label class="fw-bold">What is in the image?</label>
                <textarea id="imgDesc" class="form-control mt-2" rows="3" placeholder="e.g. A red ferrari driving on a coastal road at sunset"></textarea>
                
                <label class="fw-bold mt-3">Target Keyword (Optional)</label>
                <input type="text" id="keyword" class="form-control mt-2" placeholder="e.g. luxury cars">

                <button class="btn btn-success w-100 mt-3" onclick="generateAlt()">Generate Alt Text</button>
            </div>

            <div id="outputArea" class="mt-4" style="display:none;">
                <label>Recommended Alt Text:</label>
                <input type="text" id="altResult" class="form-control form-control-lg bg-light" readonly>
                <button class="btn btn-outline-secondary btn-sm mt-2" onclick="copyAlt()">Copy</button>
            </div>
        </div>
    </div>
</div>

<script>
async function generateAlt() {
    const desc = document.getElementById('imgDesc').value;
    const kw = document.getElementById('keyword').value;
    if(!desc) return alert("Describe the image first");

    const prompt = `Generate 1 SEO optimized ALT TEXT for an image showing: "${desc}". Include keyword: "${kw}". Output ONLY the alt text, nothing else.`;

    try {
        const res = await fetch('/api/generate-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword: prompt, mode: "standard" })
        });
        const data = await res.json();
        if(data.content) {
            document.getElementById('outputArea').style.display = 'block';
            document.getElementById('altResult').value = data.content.replace(/"/g, '');
        }
    } catch(e) { alert("Error"); }
}

function copyAlt() {
    navigator.clipboard.writeText(document.getElementById('altResult').value);
    alert("Copied!");
}
</script>
{% endblock %}
