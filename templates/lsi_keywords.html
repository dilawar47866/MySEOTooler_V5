{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h3 class="mb-0"><i class="fas fa-layer-group text-primary"></i> LSI Keyword Generator</h3>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Find Latent Semantic Indexing (LSI) keywords to boost your content relevance.</p>
                    
                    <div class="input-group mb-3">
                        <input type="text" id="seedKeyword" class="form-control form-control-lg" placeholder="Enter main keyword (e.g. Coffee Beans)">
                        <button class="btn btn-primary" onclick="generateLSI()">Generate</button>
                    </div>

                    <div id="loading" class="text-center my-4" style="display:none;">
                        <div class="spinner-border text-primary"></div>
                        <p>Analyzing semantic relationships...</p>
                    </div>

                    <div id="resultsArea" style="display:none;">
                        <label class="fw-bold">Related Keywords:</label>
                        <textarea id="lsiOutput" class="form-control bg-light" rows="10" readonly></textarea>
                        <button class="btn btn-outline-secondary mt-2" onclick="copyLSI()">Copy to Clipboard</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function generateLSI() {
    const kw = document.getElementById('seedKeyword').value;
    if(!kw) return alert("Enter a keyword");

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultsArea').style.display = 'none';

    const prompt = `Generate 20 high-quality LSI (Latent Semantic Indexing) keywords and related search terms for: "${kw}". List them as a simple comma-separated list.`;

    try {
        const res = await fetch('/api/generate-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword: prompt, mode: "standard" })
        });
        const data = await res.json();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('resultsArea').style.display = 'block';
        document.getElementById('lsiOutput').value = data.content;
    } catch(e) { alert("Error generating keywords"); }
}

function copyLSI() {
    document.getElementById('lsiOutput').select();
    document.execCommand('copy');
    alert("Copied!");
}
</script>
{% endblock %}
