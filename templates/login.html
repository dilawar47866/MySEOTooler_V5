{% extends "base.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-100">
        <h2 class="text-3xl font-bold text-center text-slate-800 mb-8">Welcome Back</h2>
        
        <form onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2 text-slate-700">Email Address</label>
                <input type="email" id="email" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2 text-slate-700">Password</label>
                <input type="password" id="password" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <button type="submit" id="btn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg">
                Log In
            </button>
        </form>
        
        <p class="text-center mt-6 text-slate-500">
            Don't have an account? <a href="{{ url_for('signup') }}" class="text-blue-600 font-bold hover:underline">Sign Up</a>
        </p>
    </div>
</div>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: email, password: password})
        });
        const data = await res.json();
        
        if(data.error) throw new Error(data.error);
        
        // Success - Redirect
        window.location.href = data.redirect;
    } catch(err) {
        alert(err.message);
        btn.innerHTML = 'Log In';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
