{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4 border-0">
                <h3 class="text-center mb-4 fw-bold text-primary">Create Account</h3>
                <p class="text-center text-muted mb-4">Join MySEO King Tool today.</p>
                
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="mb-3">
                        <label class="fw-bold small">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Choose a unique username" required minlength="3">
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">Sign Up</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="/login" class="text-decoration-none">Already have an account? Login</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function handleSignup(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // Double check just in case
    if(username.length < 3) {
        alert("Username must be at least 3 characters long.");
        return;
    }

    const btn = e.target.querySelector('button');
    btn.innerText = "Creating Account...";
    btn.disabled = true;

    try {
        const res = await fetch('/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, email, password})
        });
        const data = await res.json();
        
        if(data.success) {
            window.location.href = data.redirect;
        } else {
            alert(data.error);
            btn.innerText = "Sign Up";
            btn.disabled = false;
        }
    } catch(err) {
        alert("Connection Error");
        btn.innerText = "Sign Up";
        btn.disabled = false;
    }
}
</script>
{% endblock %}
