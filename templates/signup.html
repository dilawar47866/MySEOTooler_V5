{% extends "base.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-100">
        <h2 class="text-3xl font-bold text-center text-slate-800 mb-2">Create Account</h2>
        <p class="text-center text-slate-500 mb-8">Start your SEO journey today.</p>
        
        <form onsubmit="handleSignup(event)">
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2 text-slate-700">Username</label>
                <input type="text" id="username" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2 text-slate-700">Email Address</label>
                <input type="email" id="email" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2 text-slate-700">Password</label>
                <input type="password" id="password" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <button type="submit" id="btn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg">
                Get Started Free
            </button>
        </form>
        
        <p class="text-center mt-6 text-slate-500">
            Already have an account? <a href="{{ url_for('login') }}" class="text-blue-600 font-bold hover:underline">Log In</a>
        </p>
    </div>
</div>

<script>
async function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: username, email: email, password: password})
        });
        const data = await res.json();
        
        if(data.error) throw new Error(data.error);
        
        // Success - Redirect
        window.location.href = data.redirect;
    } catch(err) {
        alert(err.message);
        btn.innerHTML = 'Get Started Free';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
