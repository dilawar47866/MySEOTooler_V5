{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <h2><i class="fas fa-book-reader text-info"></i> Readability Checker</h2>
            <p class="text-muted">Analyze your text to see how easy it is to read (Flesch-Kincaid Score).</p>

            <div class="row">
                <!-- Input Area -->
                <div class="col-md-7">
                    <div class="card shadow-sm p-3 h-100">
                        <textarea id="textInput" class="form-control border-0" rows="15" placeholder="Paste your content here to analyze..." style="resize: none; font-size: 16px;"></textarea>
                        <div class="d-grid mt-3">
                            <button class="btn btn-primary" onclick="analyzeText()">Check Readability</button>
                        </div>
                    </div>
                </div>

                <!-- Results Area -->
                <div class="col-md-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-light fw-bold">Analysis Results</div>
                        <div class="card-body">
                            <div class="text-center mb-4">
                                <h5 class="text-muted">Reading Ease Score</h5>
                                <h1 id="scoreDisplay" class="display-4 fw-bold text-secondary">--</h1>
                                <span id="difficultyLabel" class="badge bg-secondary">Waiting for text...</span>
                            </div>

                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Words</span>
                                    <span id="wordCount" class="fw-bold">0</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Sentences</span>
                                    <span id="sentenceCount" class="fw-bold">0</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Syllables (Est.)</span>
                                    <span id="syllableCount" class="fw-bold">0</span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span>Speaking Time</span>
                                    <span id="readTime" class="fw-bold">0 min</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function analyzeText() {
    const text = document.getElementById('textInput').value;
    if(!text.trim()) return alert("Please paste some text.");

    // 1. Statistics
    const words = text.trim().split(/\s+/).length;
    const sentences = text.split(/[.!?]+/).filter(Boolean).length || 1;
    const syllables = countSyllables(text);

    // 2. Flesch Reading Ease Formula
    // 206.835 - (1.015 x ASL) - (84.6 x ASW)
    const asl = words / sentences; // Average Sentence Length
    const asw = syllables / words; // Average Syllables per Word
    let score = 206.835 - (1.015 * asl) - (84.6 * asw);
    score = Math.round(score);
    if(score > 100) score = 100;
    if(score < 0) score = 0;

    // 3. Update UI
    document.getElementById('wordCount').innerText = words;
    document.getElementById('sentenceCount').innerText = sentences;
    document.getElementById('syllableCount').innerText = syllables;
    document.getElementById('readTime').innerText = Math.ceil(words / 200) + " min";
    
    const scoreEl = document.getElementById('scoreDisplay');
    const labelEl = document.getElementById('difficultyLabel');
    scoreEl.innerText = score;

    if(score > 80) { scoreEl.className = "display-4 fw-bold text-success"; labelEl.className = "badge bg-success"; labelEl.innerText = "Very Easy (5th Grade)"; }
    else if(score > 60) { scoreEl.className = "display-4 fw-bold text-primary"; labelEl.className = "badge bg-primary"; labelEl.innerText = "Standard (8th Grade)"; }
    else if(score > 40) { scoreEl.className = "display-4 fw-bold text-warning"; labelEl.className = "badge bg-warning text-dark"; labelEl.innerText = "Fairly Difficult (College)"; }
    else { scoreEl.className = "display-4 fw-bold text-danger"; labelEl.className = "badge bg-danger"; labelEl.innerText = "Very Difficult (Graduate)"; }
}

function countSyllables(text) {
    return text.toLowerCase().split(/\s+/).reduce((acc, word) => {
        word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '')
                   .replace(/^y/, '');
        const res = word.match(/[aeiouy]{1,2}/g);
        return acc + (res ? res.length : 1);
    }, 0);
}
</script>
{% endblock %}
