{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-code text-dark"></i> Schema Markup Generator</h2>
    <p class="text-muted">Generate JSON-LD structured data for Google Rich Snippets.</p>

    <div class="row">
        <!-- Form Side -->
        <div class="col-md-6">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <select id="schemaType" class="form-select fw-bold" onchange="toggleForm()">
                        <option value="Article">Article / Blog Post</option>
                        <option value="Organization">Organization</option>
                        <option value="LocalBusiness">Local Business</option>
                    </select>
                </div>
                <div class="card-body">
                    
                    <!-- Common Fields -->
                    <div class="mb-3">
                        <label>URL</label>
                        <input type="url" id="url" class="form-control" placeholder="https://example.com/page">
                    </div>

                    <!-- Article Form -->
                    <div id="formArticle">
                        <div class="mb-3">
                            <label>Headline</label>
                            <input type="text" id="headline" class="form-control" placeholder="Article Title">
                        </div>
                        <div class="mb-3">
                            <label>Image URL</label>
                            <input type="url" id="image" class="form-control" placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="mb-3">
                            <label>Author Name</label>
                            <input type="text" id="author" class="form-control" placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label>Publisher (Org Name)</label>
                            <input type="text" id="publisher" class="form-control" placeholder="My Company">
                        </div>
                    </div>

                    <!-- Organization/Business Form -->
                    <div id="formOrg" style="display:none;">
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" id="orgName" class="form-control" placeholder="Company Name">
                        </div>
                        <div class="mb-3">
                            <label>Logo URL</label>
                            <input type="url" id="orgLogo" class="form-control" placeholder="https://example.com/logo.png">
                        </div>
                        <div class="mb-3">
                            <label>SameAs (Social Profiles)</label>
                            <input type="text" id="orgSocial" class="form-control" placeholder="https://facebook.com/mybrand">
                            <small class="text-muted">Comma separated</small>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 mt-3" onclick="generateSchema()">Generate Code</button>
                </div>
            </div>
        </div>

        <!-- Output Side -->
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white">JSON-LD Output</div>
                <div class="card-body bg-light p-0">
                    <textarea id="output" class="form-control h-100 border-0 bg-dark text-success" style="font-family: monospace; min-height: 400px; resize: none;" readonly></textarea>
                </div>
                <div class="card-footer bg-white">
                    <button class="btn btn-outline-dark btn-sm" onclick="copyCode()">Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function toggleForm() {
    const type = document.getElementById('schemaType').value;
    document.getElementById('formArticle').style.display = (type === 'Article') ? 'block' : 'none';
    document.getElementById('formOrg').style.display = (type !== 'Article') ? 'block' : 'none';
}

function generateSchema() {
    const type = document.getElementById('schemaType').value;
    const url = document.getElementById('url').value;
    let schema = {};

    if(type === 'Article') {
        schema = {
            "@context": "https://schema.org",
            "@type": "Article",
            "mainEntityOfPage": { "@type": "WebPage", "@id": url },
            "headline": document.getElementById('headline').value,
            "image": document.getElementById('image').value,
            "author": { "@type": "Person", "name": document.getElementById('author').value },
            "publisher": { "@type": "Organization", "name": document.getElementById('publisher').value }
        };
    } else {
        const social = document.getElementById('orgSocial').value.split(',').map(s => s.trim());
        schema = {
            "@context": "https://schema.org",
            "@type": type,
            "url": url,
            "name": document.getElementById('orgName').value,
            "logo": document.getElementById('orgLogo').value,
            "sameAs": social
        };
    }

    document.getElementById('output').value = `<script type="application/ld+json">\n${JSON.stringify(schema, null, 2)}\n<\/script>`;
}

function copyCode() {
    document.getElementById('output').select();
    document.execCommand('copy');
    alert("Copied!");
}
</script>
{% endblock %}
