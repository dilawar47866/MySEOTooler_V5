{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-code mr-2 text-purple-600"></i> Schema Generator</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-700">Page Title / Headline:</label>
                <input type="text" id="title" class="w-full p-3 border rounded-lg" placeholder="e.g. Ultimate Guide to SEO">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-700">Schema Type:</label>
                <select id="type" class="w-full p-3 border rounded-lg bg-white">
                    <option value="Article">Article</option>
                    <option value="Product">Product</option>
                    <option value="Organization">Organization</option>
                    <option value="FAQPage">FAQ Page</option>
                </select>
            </div>
        </div>
        
        <button onclick="generateSchema()" id="btn" class="bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700 transition w-full">
            <i class="fas fa-bolt mr-2"></i> Generate JSON-LD
        </button>

        <div id="result" class="hidden mt-8">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">Result:</h3>
                <button onclick="copySchema()" class="text-sm text-blue-500 hover:underline">Copy to Clipboard</button>
            </div>
            <textarea id="schemaOutput" readonly class="w-full h-64 p-4 bg-slate-900 text-green-400 font-mono text-sm rounded-lg"></textarea>
        </div>
    </div>
</div>

<script>
async function generateSchema() {
    const btn = document.getElementById('btn');
    const title = document.getElementById('title').value;
    const type = document.getElementById('type').value;
    
    if(!title) return alert("Please enter a title");
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/api/generate-schema', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title: title, type: type})
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        
        document.getElementById('schemaOutput').value = data.schema;
        document.getElementById('result').classList.remove('hidden');
    } catch(e) {
        alert(e.message);
    } finally {
        btn.innerHTML = '<i class="fas fa-bolt"></i> Generate JSON-LD';
        btn.disabled = false;
    }
}

function copySchema() {
    const copyText = document.getElementById("schemaOutput");
    copyText.select();
    document.execCommand("copy");
    alert("Copied to clipboard!");
}
</script>
{% endblock %}
