{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-images text-info"></i> Bulk Image SEO Audit</h2>
    <p>Scan a webpage to find images missing Alt Text.</p>

    <div class="input-group mb-4">
        <input type="url" id="url" class="form-control" placeholder="https://example.com">
        <button class="btn btn-info text-white" onclick="scanImages()">Scan Page</button>
    </div>

    <div id="loading" class="text-center" style="display:none;">
        <div class="spinner-border text-info"></div><br>Scanning images...
    </div>

    <div id="results" style="display:none;">
        <div class="alert alert-warning">
            Found <strong><span id="totalImg">0</span></strong> images. 
            <strong><span id="missingAlt">0</span></strong> are missing Alt Text.
        </div>
        
        <div id="imgList" class="row"></div>
    </div>
</div>

<script>
async function scanImages() {
    const url = document.getElementById('url').value;
    if(!url) return alert("Enter URL");

    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('imgList').innerHTML = '';

    try {
        // Reusing the Competitor Analyzer Endpoint
        const res = await fetch('/api/analyze-competitor', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url})
        });
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if(data.error) return alert(data.error);

        const images = data.analysis.images || [];
        let missingCount = 0;

        document.getElementById('results').style.display = 'block';
        document.getElementById('totalImg').innerText = images.length;

        images.forEach(img => {
            if(!img.alt) missingCount++;
            const status = img.alt ? '<span class="badge bg-success">OK</span>' : '<span class="badge bg-danger">Missing Alt</span>';
            const card = `
            <div class="col-md-6 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex align-items-center">
                        <img src="${img.src}" style="width: 80px; height: 80px; object-fit: cover; margin-right: 15px;" onerror="this.src='https://via.placeholder.com/80'">
                        <div style="overflow: hidden;">
                            <small class="text-muted text-truncate d-block">${img.src}</small>
                            <div class="mb-2">${status}</div>
                            <small><strong>Current Alt:</strong> ${img.alt || 'None'}</small>
                        </div>
                    </div>
                </div>
            </div>`;
            document.getElementById('imgList').innerHTML += card;
        });
        document.getElementById('missingAlt').innerText = missingCount;

    } catch(e) { alert("Error scanning page"); }
}
</script>
{% endblock %}
