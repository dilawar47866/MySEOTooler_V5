{% extends "base.html" %}

{% block title %}Article Wizard - MySEO King{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="h3 fw-bold mb-1">One-Click Article Wizard</h2>
                    <p class="text-muted">Generate a complete blog post.</p>
                </div>
                <div class="bg-white p-2 rounded-circle shadow-sm">
                    <i class="fas fa-magic fa-2x text-primary"></i>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <label class="form-label fw-bold">Topic</label>
                    <input type="text" id="wizardTopic" class="form-control mb-3" placeholder="e.g. How to grow tomatoes">
                    
                    <button class="btn btn-primary w-100" id="genBtn" onclick="generateArticle()">
                        Generate Article
                    </button>
                </div>
            </div>

            <div id="resultsArea" class="d-none">
                <div class="card shadow-sm bg-light p-4">
                    <div id="articleOutput" class="bg-white p-4 rounded shadow-sm"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function generateArticle() {
    const topic = document.getElementById('wizardTopic').value;
    if(!topic) return alert("Enter topic");

    document.getElementById('genBtn').disabled = true;
    document.getElementById('genBtn').innerText = "Writing...";

    try {
        const res = await fetch('/api/article-wizard', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({topic: topic})
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('articleOutput').innerHTML = data.html;
            document.getElementById('resultsArea').classList.remove('d-none');
        }
    } catch(e) { alert("Error"); }
    finally { document.getElementById('genBtn').disabled = false; }
}
</script>
{% endblock %}
