{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-3xl font-bold mb-6 text-slate-800"><i class="fas fa-pen-fancy mr-2 text-blue-600"></i> AI Article Writer</h2>
        
        <div class="mb-6">
            <label class="block text-sm font-bold mb-2 text-slate-700">Target Keyword / Topic:</label>
            <input type="text" id="keyword" class="w-full p-4 border rounded-xl text-lg focus:ring-2 focus:ring-blue-500" placeholder="e.g. The Benefits of Green Tea">
        </div>

        <button onclick="writeArticle()" id="btn" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition w-full shadow-md">
            <i class="fas fa-robot mr-2"></i> Generate Full Article
        </button>

        <div id="result" class="hidden mt-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl text-slate-800">Your Article:</h3>
                <span class="text-sm text-green-600 font-bold px-3 py-1 bg-green-100 rounded-full">Saved to Library</span>
            </div>
            <!-- Article Preview -->
            <div id="articleOutput" class="bg-white p-8 border rounded-xl shadow-inner prose max-w-none"></div>
        </div>
    </div>
</div>

<script>
async function writeArticle() {
    const btn = document.getElementById('btn');
    const keyword = document.getElementById('keyword').value;
    
    // Check URL params for topic (from keyword research tool)
    const urlParams = new URLSearchParams(window.location.search);
    if(!keyword && urlParams.has('topic')) {
        document.getElementById('keyword').value = urlParams.get('topic');
    } else if(!keyword) {
        return alert("Please enter a topic");
    }
    
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Researching & Writing (Takes ~30s)...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/api/generate-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: keyword || urlParams.get('topic')})
        });
        const data = await res.json();
        
        if(data.error) throw new Error(data.error);
        
        document.getElementById('articleOutput').innerHTML = data.html_content;
        document.getElementById('result').classList.remove('hidden');
        
        // Auto-save logic is handled by backend, so we just notify user
    } catch(e) {
        alert(e.message);
    } finally {
        btn.innerHTML = '<i class="fas fa-robot"></i> Generate Another Article';
        btn.disabled = false;
    }
}

// Auto-fill from URL if present
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('topic')) {
        document.getElementById('keyword').value = urlParams.get('topic');
    }
}
</script>
{% endblock %}
