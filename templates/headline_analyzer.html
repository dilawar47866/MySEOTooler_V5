{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2><i class="fas fa-heading text-success"></i> Headline Analyzer</h2>
            <div class="input-group mb-4">
                <input type="text" id="headline" class="form-control form-control-lg" placeholder="Enter your headline...">
                <button class="btn btn-success" onclick="analyzeHeadline()">Analyze</button>
            </div>

            <div id="scoreCard" style="display:none;">
                <div class="row text-center mb-4">
                    <div class="col-md-4">
                        <div class="card bg-light p-3">
                            <h3>Score</h3>
                            <h1 id="score" class="fw-bold text-primary">0</h1>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card p-3 text-start">
                            <h5>Feedback:</h5>
                            <ul id="feedbackList" class="mb-0"></ul>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header fw-bold bg-warning text-dark">AI Suggestions</div>
                    <div class="card-body" id="aiSuggestions">
                        <div class="spinner-border spinner-border-sm"></div> Loading better variations...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function analyzeHeadline() {
    const h = document.getElementById('headline').value;
    if(!h) return;

    document.getElementById('scoreCard').style.display = 'block';
    
    // 1. Simple JS Scoring
    let score = 60;
    let feedback = [];
    
    if(h.length > 20 && h.length < 70) { score += 10; feedback.push("✅ Good length"); } 
    else { feedback.push("⚠️ Length optimized (aim for 30-60 chars)"); }

    const powerWords = ['best', 'ultimate', 'guide', 'secret', 'review', 'free', 'easy', 'fast'];
    if(powerWords.some(w => h.toLowerCase().includes(w))) { score += 15; feedback.push("✅ Contains Power Words"); }
    
    if(h.includes('?')) { score += 5; feedback.push("✅ Question format engages users"); }
    if(/\d/.test(h)) { score += 10; feedback.push("✅ Numbers increase CTR"); }

    document.getElementById('score').innerText = Math.min(score, 100);
    document.getElementById('feedbackList').innerHTML = feedback.map(f => `<li>${f}</li>`).join('');

    // 2. Get AI Suggestions
    try {
        const prompt = `Rewrite this headline to be more click-worthy and SEO friendly: "${h}". Provide 5 variations.`;
        const res = await fetch('/api/generate-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword: prompt, mode: "standard" })
        });
        const data = await res.json();
        document.getElementById('aiSuggestions').innerHTML = `<pre style="white-space: pre-wrap;">${data.content}</pre>`;
    } catch(e) {
        document.getElementById('aiSuggestions').innerText = "Could not load AI suggestions.";
    }
}
</script>
{% endblock %}
