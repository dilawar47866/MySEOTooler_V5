{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2><i class="fas fa-project-diagram text-warning"></i> Keyword Cluster Strategist</h2>
            <p class="text-muted">Don't just find keywords. Build a content authority map.</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="card shadow-sm p-4 mb-4 border-0">
        <div class="input-group input-group-lg">
            <input type="text" id="seedKeyword" class="form-control" placeholder="Enter main topic (e.g. Keto Diet)">
            <button class="btn btn-warning text-dark fw-bold" onclick="generateClusters()">
                <i class="fas fa-magic"></i> Generate Strategy
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-5" style="display:none;">
        <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;"></div>
        <h4 class="mt-3">Designing Content Strategy...</h4>
        <p class="text-muted">Grouping keywords by search intent.</p>
    </div>

    <!-- Results Grid -->
    <div id="resultsArea" class="row g-4" style="display:none;">
        <!-- Clusters will be injected here via JS -->
    </div>
</div>

<script>
async function generateClusters() {
    const kw = document.getElementById('seedKeyword').value;
    if(!kw) return alert("Enter a topic");

    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultsArea').style.display = 'none';
    document.getElementById('resultsArea').innerHTML = '';

    try {
        const res = await fetch('/api/generate-clusters', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword: kw })
        });
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if(data.success) {
            document.getElementById('resultsArea').style.display = 'flex';
            
            data.clusters.forEach((cluster, index) => {
                let keywordsHtml = cluster.keywords.map(k => `<li class="list-group-item"><i class="fas fa-search text-muted me-2 small"></i>${k}</li>`).join('');
                
                let html = `
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-header bg-white fw-bold text-uppercase text-primary">
                            <i class="fas fa-bullseye me-2"></i> ${cluster.name}
                        </div>
                        <ul class="list-group list-group-flush">
                            ${keywordsHtml}
                        </ul>
                        <div class="card-footer bg-white">
                            <button class="btn btn-sm btn-outline-primary w-100" onclick="copyToClipboard('${cluster.keywords.join(', ')}')">Copy Keywords</button>
                        </div>
                    </div>
                </div>`;
                document.getElementById('resultsArea').innerHTML += html;
            });
        } else {
            alert("Error: " + data.error);
        }
    } catch(e) {
        alert("AI Error. Try again.");
        document.getElementById('loading').style.display = 'none';
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    alert("Keywords copied!");
}
</script>
{% endblock %}
