{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-search mr-2 text-blue-600"></i> Keyword Research</h2>
        
        <div class="flex gap-4 mb-6">
            <input type="text" id="keyword" class="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Enter seed keyword (e.g. vegan diet)">
            <button onclick="getKeywords()" id="btn" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                Search
            </button>
        </div>

        <div id="result" class="hidden mt-8">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100">
                        <th class="p-4 border-b font-bold text-slate-700">Keyword Idea</th>
                        <th class="p-4 border-b font-bold text-slate-700 w-32">Action</th>
                    </tr>
                </thead>
                <tbody id="keywordList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function getKeywords() {
    const btn = document.getElementById('btn');
    const keyword = document.getElementById('keyword').value;
    
    if(!keyword) return alert("Enter a keyword");
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    btn.disabled = true;
    
    try {
        const res = await fetch('/api/generate-keywords', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: keyword})
        });
        const data = await res.json();
        
        if(data.error) throw new Error(data.error);
        
        const tbody = document.getElementById('keywordList');
        tbody.innerHTML = '';
        
        data.keywords.forEach(kw => {
            tbody.innerHTML += `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 border-b text-slate-700">${kw}</td>
                    <td class="p-4 border-b">
                        <a href="/content-generator?topic=${encodeURIComponent(kw)}" class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full hover:bg-blue-200">Write This</a>
                    </td>
                </tr>
            `;
        });
        
        document.getElementById('result').classList.remove('hidden');
    } catch(e) {
        alert(e.message);
    } finally {
        btn.innerHTML = 'Search';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
