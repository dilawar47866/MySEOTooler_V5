{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2><i class="fas fa-chart-bar text-success"></i> SERP Strategy Analyzer</h2>
    <input type="text" id="kw" class="form-control mb-3" placeholder="Target Keyword...">
    <button class="btn btn-success w-100" onclick="analyzeSerp()">Analyze Competition</button>
    <div id="output" class="mt-3 card p-3 d-none"></div>
</div>
<script>
async function analyzeSerp() {
    const k = document.getElementById('kw').value;
    if(!k) return;
    document.getElementById('output').classList.remove('d-none');
    document.getElementById('output').innerText = "Analyzing Search Intent...";
    const res = await fetch('/api/generate-content', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword: `Act as a SERP Analyst. For keyword "${k}", analyze the likely User Intent (Info/Trans/Comm). Suggest the perfect H1, Word Count, and 5 sub-topics required to rank #1 based on current SEO best practices.`, mode:'standard'})});
    const d = await res.json();
    document.getElementById('output').innerHTML = d.html_content;
}
</script>
{% endblock %}
