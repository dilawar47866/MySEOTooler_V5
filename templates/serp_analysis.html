{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-chart-line mr-2 text-purple-600"></i> SERP Analysis</h2>
        
        <div class="mb-6">
            <label class="block text-sm font-bold mb-2 text-slate-700">Keyword to Analyze:</label>
            <input type="text" id="keyword" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="e.g. Best SEO Tools">
        </div>
        
        <button onclick="analyzeSerp()" id="btn" class="bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700 transition w-full">
            <i class="fas fa-microscope mr-2"></i> Analyze Results
        </button>

        <div id="result" class="hidden mt-8">
            <div class="bg-slate-50 p-6 rounded-lg border whitespace-pre-wrap" id="analysisOutput"></div>
        </div>
    </div>
</div>

<script>
async function analyzeSerp() {
    const btn = document.getElementById('btn');
    const keyword = document.getElementById('keyword').value;
    
    if(!keyword) return alert("Enter a keyword");
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing Data...';
    btn.disabled = true;
    
    try {
        const res = await fetch('/api/serp-analysis', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: keyword})
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        
        document.getElementById('analysisOutput').innerText = data.data.analysis;
        document.getElementById('result').classList.remove('hidden');
    } catch(e) {
        alert(e.message);
    } finally {
        btn.innerHTML = '<i class="fas fa-microscope"></i> Analyze Results';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
