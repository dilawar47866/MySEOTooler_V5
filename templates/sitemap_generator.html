{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-sitemap text-warning"></i> XML Sitemap Generator</h2>
            </div>

            <!-- Input Card -->
            <div class="card shadow-sm p-4 mb-4">
                <label class="fw-bold mb-2">Website URL to Crawl</label>
                <div class="input-group input-group-lg">
                    <input type="url" id="siteUrl" class="form-control" placeholder="https://yourwebsite.com">
                    <button class="btn btn-warning text-dark fw-bold" onclick="generateSitemap()">
                        Generate Sitemap
                    </button>
                </div>
                <small class="text-muted mt-2"><i class="fas fa-info-circle"></i> Crawls internal links to build a valid XML file. (Limit: 50 links for speed)</small>
            </div>

            <!-- Loading State -->
            <div id="loadingMap" class="text-center py-5" style="display:none;">
                <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;"></div>
                <h4 class="mt-3">Crawling website...</h4>
                <p class="text-muted">This may take up to 60 seconds depending on the site speed.</p>
            </div>

            <!-- Output Card -->
            <div id="resultArea" class="card shadow-sm" style="display:none;">
                <div class="card-header bg-light fw-bold d-flex justify-content-between align-items-center">
                    <span>XML Output</span>
                    <div>
                        <button class="btn btn-sm btn-outline-dark" onclick="copySitemap()">Copy</button>
                        <button class="btn btn-sm btn-success" onclick="downloadSitemap()">Download .xml</button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <textarea id="xmlOutput" class="form-control border-0" style="min-height: 400px; font-family: monospace; font-size: 14px; resize: vertical;" readonly></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function generateSitemap() {
    const url = document.getElementById('siteUrl').value;
    if(!url) return alert("Please enter a valid URL starting with https://");

    document.getElementById('loadingMap').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';

    try {
        // Uses the python endpoint created earlier
        const res = await fetch('/api/generate-sitemap', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url})
        });
        
        const data = await res.json();
        document.getElementById('loadingMap').style.display = 'none';
        
        if(data.success) {
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('xmlOutput').value = data.sitemap;
        } else {
            alert("Error: " + data.error);
        }
    } catch(e) {
        document.getElementById('loadingMap').style.display = 'none';
        alert("Connection Error. Ensure the server is running.");
    }
}

function copySitemap() {
    document.getElementById("xmlOutput").select();
    document.execCommand("copy");
    alert("Copied to clipboard!");
}

function downloadSitemap() {
    const text = document.getElementById("xmlOutput").value;
    const blob = new Blob([text], { type: "text/xml" });
    const anchor = document.createElement("a");
    anchor.download = "sitemap.xml";
    anchor.href = window.URL.createObjectURL(blob);
    anchor.target = "_blank";
    anchor.style.display = "none"; 
    document.body.appendChild(anchor);
    anchor.click();
    document.body.removeChild(anchor);
}
</script>
{% endblock %}
