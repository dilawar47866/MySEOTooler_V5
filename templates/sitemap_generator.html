{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-sitemap"></i> XML Sitemap Generator</h2>
    </div>

    <!-- Explanation -->
    <div class="alert alert-info">
        <i class="fas fa-info-circle"></i> This tool crawls your homepage to find internal links and builds a valid XML sitemap. 
        <br><strong>Note:</strong> To ensure speed, this demo is limited to the first 50 links found.
    </div>

    <!-- Input -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <label class="form-label fw-bold">Website URL</label>
            <div class="input-group">
                <input type="url" id="siteUrl" class="form-control" placeholder="https://yourwebsite.com">
                <button class="btn btn-primary" onclick="generateSitemap()">
                    <i class="fas fa-magic"></i> Generate Sitemap
                </button>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loadingMap" class="text-center py-4" style="display:none;">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2">Crawling website links... Please wait.</p>
    </div>

    <!-- Output -->
    <div class="card shadow-sm">
        <div class="card-header bg-light fw-bold">XML Output</div>
        <div class="card-body">
            <textarea id="xmlOutput" class="form-control" 
                style="min-height: 400px; font-family: monospace; white-space: pre;" placeholder="Your XML will appear here..."></textarea>
            
            <div class="mt-3">
                <button class="btn btn-outline-secondary" onclick="copySitemap()">
                    <i class="fas fa-copy"></i> Copy XML
                </button>
                <button class="btn btn-outline-success" onclick="downloadSitemap()">
                    <i class="fas fa-download"></i> Download sitemap.xml
                </button>
            </div>
        </div>
    </div>
</div>

<script>
async function generateSitemap() {
    const url = document.getElementById('siteUrl').value;
    if(!url) return alert("Please enter a valid URL");

    document.getElementById('loadingMap').style.display = 'block';
    document.getElementById('xmlOutput').value = "";

    try {
        const res = await fetch('/api/generate-sitemap', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url})
        });
        
        const data = await res.json();
        document.getElementById('loadingMap').style.display = 'none';
        
        if(data.success) {
            document.getElementById('xmlOutput').value = data.sitemap;
        } else {
            document.getElementById('xmlOutput').value = "Error: " + data.error;
            alert("Failed to generate sitemap: " + data.error);
        }
    } catch(e) {
        document.getElementById('loadingMap').style.display = 'none';
        alert("Error connecting to server.");
    }
}

function copySitemap() {
    const copyText = document.getElementById("xmlOutput");
    copyText.select();
    document.execCommand("copy");
    alert("XML copied to clipboard!");
}

function downloadSitemap() {
    const text = document.getElementById("xmlOutput").value;
    if(!text) return alert("Generate a sitemap first!");
    
    const element = document.createElement('a');
    element.setAttribute('href', 'data:text/xml;charset=utf-8,' + encodeURIComponent(text));
    element.setAttribute('download', 'sitemap.xml');
    element.style.display = 'none';
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);
}
</script>
{% endblock %}
